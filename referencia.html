<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML · Referencia</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0b1120;
    --surface:   #0f1829;
    --border:    #1e2d45;
    --text:      #ffffff;
    --muted:     #64748b;
    --accent:    #22c55e;
    --accent-bg: rgba(34,197,94,0.12);
  }

  body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; font-size: 14px; }

  /* ── Layout ── */
  #layout { display: flex; flex: 1; overflow: hidden; height: 100vh; }

  /* ── Sidebar ── */
  aside {
    width: 240px; flex-shrink: 0; background: var(--surface);
    border-right: 1px solid var(--border); overflow-y: auto;
    padding: 24px 0;
  }
  .sidebar-title {
    text-transform: uppercase; letter-spacing: .08em; font-size: 11px;
    color: var(--muted); padding: 0 20px 12px;
  }
  .sidebar-btn {
    display: block; width: 100%; text-align: left; background: none; border: none;
    padding: 7px 20px; color: var(--muted); cursor: pointer; font-size: 13px;
    border-left: 3px solid transparent; transition: all .15s;
  }
  .sidebar-btn:hover { color: #fff; background: var(--accent-bg); }
  .sidebar-btn.active { color: var(--accent); background: var(--accent-bg); border-left-color: var(--accent); }

  /* ── Main ── */
  main { flex: 1; overflow-y: auto; padding: 40px 48px; background: #fff; color: #111; }

  .section-header { display: flex; align-items: baseline; gap: 16px; margin-bottom: 8px; }
  .section-num {
    background: var(--accent); color: #fff; font-size: 11px; font-weight: 700;
    padding: 2px 8px; border-radius: 4px; letter-spacing: .04em;
  }
  .section-title { font-size: 28px; font-weight: 700; color: #111; }
  .section-desc { color: #475569; margin-bottom: 28px; line-height: 1.6; max-width: 680px; }

  /* ── Tabs ── */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid #e2e8f0; margin-bottom: 24px; }
  .tab-btn {
    padding: 8px 18px; background: none; border: none; border-bottom: 2px solid transparent;
    color: #64748b; cursor: pointer; font-size: 13px; margin-bottom: -1px;
    transition: all .15s;
  }
  .tab-btn:hover { color: #111; }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── Preview box ── */
  .preview-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: .1em;
    color: var(--muted); margin-bottom: 8px;
  }
  .preview-box {
    border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden;
    margin-bottom: 24px;
  }
  .preview-bar {
    background: #f8fafc; border-bottom: 1px solid #e2e8f0;
    padding: 8px 14px; font-size: 11px; text-transform: uppercase;
    letter-spacing: .08em; color: #64748b;
  }
  .preview-content {
    background: #fff; color: #111; padding: 24px; min-height: 80px;
    font-family: system-ui, sans-serif;
  }
  .preview-content h1 { font-size: 2em; font-weight: 700; margin-bottom: .3em; }
  .preview-content h2 { font-size: 1.5em; font-weight: 700; margin-bottom: .3em; }
  .preview-content h3 { font-size: 1.17em; font-weight: 700; margin-bottom: .3em; }
  .preview-content p  { margin-bottom: .6em; line-height: 1.6; }
  .preview-content ul, .preview-content ol { padding-left: 1.5em; margin-bottom: .6em; }
  .preview-content li { margin-bottom: .2em; }
  .preview-content table { border-collapse: collapse; }
  .preview-content th, .preview-content td { border: 1px solid #ccc; padding: 6px 12px; }
  .preview-content th { background: #f3f4f6; }
  .preview-content input, .preview-content select, .preview-content textarea {
    border: 1px solid #ccc; padding: 6px 10px; border-radius: 4px; font-size: 14px;
    display: block; margin-bottom: 8px; width: 240px;
  }
  .preview-content button {
    background: #3b82f6; color: #fff; border: none; padding: 7px 18px;
    border-radius: 4px; cursor: pointer; font-size: 14px;
  }
  .preview-content a { color: #2563eb; }
  .preview-content img { max-width: 100%; }
  .preview-content figure { margin: 0; }
  .preview-content figcaption { font-size: 12px; color: #666; margin-top: 4px; }
  .preview-content header, .preview-content nav, .preview-content main,
  .preview-content footer, .preview-content article, .preview-content section,
  .preview-content aside {
    display: block; border: 2px dashed #cbd5e1; padding: 10px 14px; margin-bottom: 8px;
    border-radius: 4px; position: relative;
  }
  .preview-content header::before  { content: '<header>';  font-size:10px; color:#94a3b8; }
  .preview-content nav::before     { content: '<nav>';     font-size:10px; color:#94a3b8; }
  .preview-content main::before    { content: '<main>';    font-size:10px; color:#94a3b8; }
  .preview-content footer::before  { content: '<footer>';  font-size:10px; color:#94a3b8; }
  .preview-content article::before { content: '<article>'; font-size:10px; color:#94a3b8; }
  .preview-content section::before { content: '<section>'; font-size:10px; color:#94a3b8; }
  .preview-content aside::before   { content: '<aside>';   font-size:10px; color:#94a3b8; }

  /* ── Code block ── */
  .code-box {
    border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden;
    position: relative;
  }
  .code-bar {
    background: #f8fafc; border-bottom: 1px solid #e2e8f0;
    padding: 8px 14px; font-size: 11px; text-transform: uppercase;
    letter-spacing: .08em; color: #64748b; display: flex;
    justify-content: space-between; align-items: center;
  }
  .copy-btn {
    background: #f1f5f9; border: 1px solid #e2e8f0; color: #64748b;
    padding: 3px 10px; border-radius: 4px; font-size: 11px; cursor: pointer;
    display: flex; align-items: center; gap: 5px; transition: all .15s;
  }
  .copy-btn:hover { color: #111; border-color: var(--accent); }
  .copy-btn.copied { color: #22c55e; border-color: #22c55e; }

  pre[class*="language-"] {
    margin: 0 !important; border-radius: 0 !important; font-size: 13px !important;
    padding: 20px !important; max-height: 360px; overflow-y: auto;
  }
  code[class*="language-"] { font-family: 'Fira Code', 'Cascadia Code', monospace !important; }

  /* ── Attribute table ── */
  .attr-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .attr-table th {
    text-align: left; padding: 8px 12px; border-bottom: 1px solid #e2e8f0;
    color: #64748b; font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: .06em;
  }
  .attr-table td { padding: 9px 12px; border-bottom: 1px solid #e2e8f0; color: #111; }
  .attr-table tr:last-child td { border-bottom: none; }
  .attr-table code { background: var(--border); padding: 1px 5px; border-radius: 3px; font-family: monospace; font-size: 12px; color: #93c5fd; }

  /* welcome */
  #welcome { max-width: 560px; padding-top: 40px; }
  #welcome h1 { font-size: 32px; font-weight: 800; color: #111; margin-bottom: 12px; }
  #welcome p  { color: #475569; line-height: 1.7; margin-bottom: 8px; }
  #welcome ul { color: #475569; padding-left: 1.4em; line-height: 2; }
</style>
</head>
<body>

<div id="layout">

  <!-- Sidebar -->
  <aside>
    <div style="padding:0 20px 20px;border-bottom:1px solid var(--border);margin-bottom:16px">
      <span style="font-weight:700;font-size:14px;color:#fff;letter-spacing:.03em">HTML · Docs</span>
      <a href="index.html" style="display:flex;align-items:center;gap:6px;margin-top:12px;padding:7px 10px;background:var(--accent-bg);border:1px solid rgba(34,197,94,0.3);border-radius:6px;color:var(--accent);font-size:12px;font-weight:600;text-decoration:none;transition:border-color .15s" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='rgba(34,197,94,0.3)'">
        🚀 Jugar HTML Quest
      </a>
    </div>
    <div class="sidebar-title">Contenido</div>
    <div id="sidebarLinks"></div>
  </aside>

  <!-- Main -->
  <main id="mainContent">
    <div id="welcome">
      <h1>HTML Reference</h1>
      <p>Guía de referencia interactiva de HTML. Selecciona una sección para ver ejemplos, código y atributos.</p>
      <ul>
        <li>Vista previa en tiempo real</li>
        <li>Código listo para copiar</li>
        <li>Tabla de atributos por elemento</li>
      </ul>
    </div>
  </main>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>
<script>

───────────────────────────────────────────── */
const sections = [

/* ─────────────────────────────────────────────
   BUILD UI
───────────────────────────────────────────── */
const sidebarLinks = document.getElementById('sidebarLinks');
const mainContent  = document.getElementById('mainContent');

sections.forEach((sec, i) => {
  const num = String(i + 1).padStart(2, '0');

  // sidebar link
  const sideBtn = document.createElement('button');
  sideBtn.className = 'sidebar-btn';
  sideBtn.textContent = `${num} · ${sec.title}`;
  sideBtn.dataset.id = sec.id;
  sideBtn.onclick = () => loadSection(sec.id);
  sidebarLinks.appendChild(sideBtn);
});

function loadSection(id) {
  const sec = sections.find(s => s.id === id);
  const idx = sections.findIndex(s => s.id === id);
  const num = String(idx + 1).padStart(2, '0');

  // update active states
  document.querySelectorAll('.sidebar-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.id === id);
  });

  mainContent.innerHTML = `
    <div class="section-header">
      <span class="section-num">${num}</span>
      <h1 class="section-title">${sec.title}</h1>
    </div>
    <p class="section-desc">${sec.desc}</p>

    <div class="tabs" id="tabs">
      ${sec.tabs.map((t, i) => `
        <button class="tab-btn ${i===0?'active':''}" onclick="switchTab(${i})" data-tab="${i}">
          ${t.label}
        </button>
      `).join('')}
    </div>

    ${sec.tabs.map((t, i) => `
      <div class="tab-panel ${i===0?'active':''}" id="panel-${i}">

        <div class="preview-box">
          <div class="preview-bar">Vista Previa</div>
          <div class="preview-content">${t.preview}</div>
        </div>

        <div class="code-box">
          <div class="code-bar">
            <span>HTML</span>
            <button class="copy-btn" onclick="copyCode(this)">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
              </svg>
              Copiar
            </button>
          </div>
          <pre class="language-markup"><code class="language-markup">${escHtml(t.code)}</code></pre>
        </div>

        ${t.attrs && t.attrs.length ? `
          <table class="attr-table" style="margin-top:24px">
            <thead><tr><th>Atributo / Elemento</th><th>Aplica a</th><th>Descripción</th></tr></thead>
            <tbody>
              ${t.attrs.map(a => `
                <tr>
                  <td><code>${escHtml(a.name)}</code></td>
                  <td><code>${escHtml(a.elem)}</code></td>
                  <td>${a.desc}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        ` : ''}

      </div>
    `).join('')}
  `;

  // highlight
  Prism.highlightAll();
}

function switchTab(idx) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  document.querySelectorAll('.tab-panel').forEach((p,i) => p.classList.toggle('active', i===idx));
}

function copyCode(btn) {
  const pre = btn.closest('.code-box').querySelector('code');
  navigator.clipboard.writeText(pre.innerText).then(() => {
    btn.classList.add('copied');
    btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Copiado`;
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copiar`;
    }, 2000);
  });
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// load first section on start (or from URL param ?s=sectionId)
const urlParam = new URLSearchParams(window.location.search).get('s');
const startSection = sections.find(s => s.id === urlParam) ? urlParam : sections[0].id;
loadSection(startSection);

</script>
